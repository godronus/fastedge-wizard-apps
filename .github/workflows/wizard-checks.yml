name: Wizard checks

on:
  pull_request:
    paths:
      - '*/src/**'
      - '*/package.json'
      - '.stylelintrc.json'

permissions:
  contents: write

jobs:
  stylelint:
    name: Stylelint — no raw colours
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/setup-node
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:css

  visual-and-a11y:
    name: Screenshot diff + axe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Allow pushing baseline snapshots back to the PR branch.
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - uses: ./.github/setup-node
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: npx playwright install --with-deps chromium

      # --update-snapshots=missing: creates PNGs that don't exist yet (first-time
      # setup) without overwriting existing ones. Tests still fail on actual diffs.
      - run: pnpm test:e2e -- --update-snapshots=missing

      # If new baselines were just generated, commit them so the next run compares.
      - name: Commit new baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/snapshots/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: add missing playwright baselines [skip ci]"
            git push
          fi

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
